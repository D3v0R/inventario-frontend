<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario NoSQL</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h2>Panel de Inventario</h2>
    <div class="card">
        <form id="formProducto">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="number" id="precio" placeholder="Precio" required>
            <input type="number" id="existencia" placeholder="Stock" required>
            <button type="submit">Guardar</button>
        </form>
    </div>
    <div class="card">
        <input type="text" id="busqueda" placeholder="Buscar por nombre..." onkeyup="filtrarProductos()">
        <table>
            <thead><tr><th>Artículo</th><th>Precio</th><th>Stock</th><th>Acción</th></tr></thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
